<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- 字体 -->
  <link href="https://lf-code-agent.coze.cn/obj/x-ai-cn/fonts/google/google-all-fonts.css" rel="stylesheet"/>

  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/jquery/jquery-3.7.1.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/lucide/lucide-1.11.0.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/tailwindcss/tailwindcss-browser-4.2.4.min.js"></script>

  <style type="text/tailwindcss">
    @theme {
      /* === 品牌色 === */
      --color-primary:              #C96F3D;
      --color-primary-container:    #FFF9F1;
      --color-on-primary:           #ffffff;
      /* === 背景 / 表面（纸感风） === */
      --color-background:                 #FBF3E7;
      --color-surface-container-lowest:   #FFF9F1;
      --color-surface:                    #FBF3E7;
      --color-surface-container:          #FFF9F1;
      --color-surface-container-high:     #F5EDE3;
      --color-surface-container-highest:  #EDE5DA;
      /* === 文字 === */
      --color-on-surface:           #31251B;
      --color-on-surface-variant:   #8B7662;
      /* === 功能色 === */
      --color-success:  #7E9F7A;
      --color-error:    #D9534F;
      --color-warning:  #F0AD4E;
      /* === 边框 === */
      --color-outline:          #8B7662;
      --color-outline-variant:  #D4C9BC;
      /* === 圆角 === */
      --radius-sm:   0.25rem;
      --radius-md:   0.5rem;
      --radius-lg:   0.75rem;
      --radius-xl:   1rem;
      --radius-2xl:  1.5rem;
      --radius-full: 9999px;
      /* === 阴影 === */
      --shadow-card:   0 2px 8px rgba(49, 37, 27, 0.08);
      --shadow-float:  0 4px 16px rgba(49, 37, 27, 0.12);
      --shadow-dialog: 0 8px 32px rgba(49, 37, 27, 0.16);
      /* === 字体 === */
      --font-sans: "Georgia", "Noto Serif SC", system-ui, serif;
    }
  </style>

  <style>
    body {
      min-height: max(812px, 100dvh);
      font-family: var(--font-sans);
    }
  </style>

  <!-- 图片兜底 -->
  <script>
    document.addEventListener('error', function (e) {
      const img = e.target;
      if (img.tagName !== 'IMG' || img.dataset.fallback) return;
      img.dataset.fallback = '1';
      const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const cat = img.getAttribute('data-category') || '其他';
      const alt = img.getAttribute('alt') || '';
      const label = esc(alt.length > 8 ? alt.slice(0, 8) + '…' : alt);
      const icons = { '人物': '👤', '自然风景': '🏞', '动物': '🐾', '建筑城市': '🏙', '运动体育': '⚽', '交通工具': '🚗', '食物': '🍽', '服饰时尚': '👗', '商业科技': '💼', '游戏娱乐': '🎮', '艺术': '🎨', '其他': '🖼' };
      const icon = icons[cat] || '🖼';
      const w = img.width || 400, h = img.height || 300;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><rect width="100%" height="100%" fill="%23f3f4f6"/><text x="50%" y="45%" text-anchor="middle" font-size="${Math.min(w, h) * 0.18}" dominant-baseline="central">${icon}</text><text x="50%" y="68%" text-anchor="middle" font-size="${Math.min(w, h) * 0.07}" fill="%239ca3af" font-family="system-ui,sans-serif" dominant-baseline="central">${label}</text></svg>`;
      img.src = 'data:image/svg+xml,' + svg;
    }, true);
  </script>
</head>

<body class="bg-background text-on-surface font-sans">

  <!-- @nav:start 导航组件，不需要的页面则不要复制此段（从 @nav:start 到 @nav:end） -->
  <!-- 顶部 Header（一级页无返回按钮） -->
  <header class="bg-background sticky top-0 z-40 h-14 flex items-center justify-between px-4">
    <div class="w-10 h-10 flex items-center justify-center">
    </div>
    <h1 class="text-base font-semibold text-on-surface">面试练习</h1>
    <button class="w-10 h-10 flex items-center justify-center text-on-surface-variant rounded-full
                   hover:bg-surface-container transition-colors">
      <i data-lucide="settings" class="w-5 h-5"></i>
    </button>
  </header>

  <!-- 底部 TabBar（一级页专用） -->
  <nav class="fixed bottom-0 left-0 right-0 z-40 bg-surface
              flex justify-around items-center h-14 pb-[env(safe-area-inset-bottom)]
              border-t border-outline-variant/20">
    <a href="home.html" class="flex flex-col items-center gap-0.5 px-5 py-1.5 text-primary"
       aria-current="page">
      <i data-lucide="book-open" class="w-5 h-5"></i>
      <span class="text-[10px] font-bold tracking-wide">题库</span>
    </a>
    <a href="random.html" class="flex flex-col items-center gap-0.5 px-5 py-1.5 text-on-surface-variant
                       hover:text-on-surface transition-colors">
      <i data-lucide="shuffle" class="w-5 h-5"></i>
      <span class="text-[10px] font-bold tracking-wide">随机</span>
    </a>
    <a href="interview.html" class="flex flex-col items-center gap-0.5 px-5 py-1.5 text-on-surface-variant
                       hover:text-on-surface transition-colors">
      <i data-lucide="mic" class="w-5 h-5"></i>
      <span class="text-[10px] font-bold tracking-wide">面试</span>
    </a>
    <a href="history.html" class="flex flex-col items-center gap-0.5 px-5 py-1.5 text-on-surface-variant
                       hover:text-on-surface transition-colors">
      <i data-lucide="history" class="w-5 h-5"></i>
      <span class="text-[10px] font-bold tracking-wide">记录</span>
    </a>
  </nav>
  <!-- @nav:end 导航组件，不需要的页面则不要复制此段 -->

  <main class="flex-1">
    <!-- @main-content:start -->
    <!-- @main-content:end -->
  </main>

  <script>lucide.createIcons();</script>
</body>

</html>
